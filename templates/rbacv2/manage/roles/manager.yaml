apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:sds-node-configurator:manager
  labels:
    heritage: deckhouse
    module: sds-node-configurator
    rbac.deckhouse.io/use-role: user
    rbac.deckhouse.io/kind: manage
    rbac.deckhouse.io/level: subsystem
    rbac.deckhouse.io/subsystem: sds-node-configurator
    rbac.deckhouse.io/aggregate-to-sds-node-configurator-as: superadmin
    rbac.deckhouse.io/aggregate-to-all-as: manager
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: manage
        rbac.deckhouse.io/aggregate-to-sds-node-configurator-as: manager
rules: []
