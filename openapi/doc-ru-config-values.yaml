type: object
properties:
  disableDs:
    description: Выключить DaemonSet `sds-node-configurator`.
  logLevel:
    description: Уровень логирования для приложений модуля.
  enableThinProvisioning:
    description: Включить поддержку thin-LVM-томов.
  enableNetlinkBlockDeviceDiscovery:
    description: |
      Использовать netlink/sysfs вместо `lsblk` как источник данных для обнаружения блочных устройств в agent.
      При выключенном флаге agent обнаруживает блочные устройства через `lsblk`.
  fileDevicesDirectory:
    description: |
      Базовый каталог на каждом узле, внутри которого агенту разрешено создавать
      файлы-подложки для файловых LVM-устройств (`spec.fileDevices`).

      Каждый `spec.fileDevices[].directory` должен совпадать с этим каталогом
      либо быть его подкаталогом; файлы-подложки вне этого поддерева агент
      отклоняет, чтобы произвольный путь на узле (например, `/` или
      `/var/lib/kubelet`) нельзя было переполнить. Переопределите параметр,
      указав отдельный диск с данными, смонтированный на узле, если в каталоге
      по умолчанию недостаточно места.
