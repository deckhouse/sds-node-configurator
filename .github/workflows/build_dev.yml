name: Build and push for dev

env:
  MODULES_REGISTRY: ${{ vars.DEV_REGISTRY }}
  CI_COMMIT_REF_NAME: ${{ github.ref_name }}
  MODULES_MODULE_NAME: ${{ vars.MODULE_NAME }}
  MODULES_MODULE_SOURCE: ${{ vars.DEV_MODULE_SOURCE }}
  MODULES_REGISTRY_LOGIN: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
  MODULES_REGISTRY_PASSWORD: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}
  GOPROXY: ${{ secrets.GOPROXY }}
  SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
  SOURCE_REPO_SSH_KEY: ${{ secrets.SOURCE_REPO_SSH_KEY }}
  BASE_IMAGES_VERSION: "v0.5.64"
on:
  # On PR, build_dev runs only via workflow_call from "Build and checks" (trivy_image_check.yaml) to avoid two runs (direct trigger + call).
  workflow_call:
    inputs:
      svace_enabled:
        description: "Enable svace build and analyze"
        type: boolean
        required: false
      # Set only from "Build and checks" (trivy_image_check.yaml). Do not rely on github.event.pull_request
      # inside this reusable workflow — github.event may not match the caller's pull_request payload.
      run_e2e_smoke_tests:
        description: "Run E2E smoke tests (PR has label e2e-smoke-test)"
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: [self-hosted, regular]
    continue-on-error: true
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - name: Copy openapi/values_ce.yaml to openapi/values.yaml
        run: |
          if [ -f openapi/values_ce.yaml ]; then
            cp -f openapi/values_ce.yaml openapi/values.yaml
          fi
      - uses: deckhouse/modules-actions/lint@v4
        env:
          DMT_METRICS_URL: ${{ secrets.DMT_METRICS_URL }}
          DMT_METRICS_TOKEN: ${{ secrets.DMT_METRICS_TOKEN }}
      - name: Copy openapi/values_ee.yaml to openapi/values.yaml
        run: |
          if [ -f openapi/values_ee.yaml ]; then
            cp -f openapi/values_ee.yaml openapi/values.yaml
          fi
      - uses: deckhouse/modules-actions/lint@v4
        env:
          DMT_METRICS_URL: ${{ secrets.DMT_METRICS_URL }}
          DMT_METRICS_TOKEN: ${{ secrets.DMT_METRICS_TOKEN }}

  set_edition:
    runs-on: [self-hosted, large]
    name: Set edition
    outputs:
      module_edition: ${{ steps.set-vars.outputs.MODULE_EDITION }}
    steps:
      - name: Get Pull Request Labels
        id: get-labels
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === "pull_request" || context.eventName === "pull_request_target" ) {
              const prNumber = context.payload.pull_request.number;
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              return labels.map(label => label.name);
            } else {
              return [];
            }
          result-encoding: string

      - name: Set vars
        id: set-vars
        run: |
          # Select edition for build, default ee
          if echo "${{ steps.get-labels.outputs.result }}" | grep -q "edition/ce"; then
            echo "MODULE_EDITION=ce" >> "$GITHUB_OUTPUT"
          else
            echo "MODULE_EDITION=ee" >> "$GITHUB_OUTPUT"
          fi

  dev_setup_build:
    runs-on: [self-hosted, large]
    name: Build and Push images
    needs: [set_edition]
    env:
      MODULE_EDITION: ${{needs.set_edition.outputs.module_edition}}
    steps:
      - name: Set vars for PR
        if: ${{ github.ref_name != 'main' }}
        run: |
          MODULES_MODULE_TAG="$(echo pr${{ github.ref_name }} | sed 's/\/.*//g')"
          echo "MODULES_MODULE_TAG=$MODULES_MODULE_TAG" >> "$GITHUB_ENV"
      - name: Set vars for main
        if: ${{ github.ref_name == 'main' }}
        run: |
          echo "MODULES_MODULE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
      - name: Print vars
        run: |
          echo MODULES_REGISTRY=$MODULES_REGISTRY
          echo CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME
          echo MODULES_MODULE_NAME=$MODULES_MODULE_NAME
          echo MODULES_MODULE_SOURCE=$MODULES_MODULE_SOURCE
          echo MODULES_MODULE_TAG=$MODULES_MODULE_TAG
          echo MODULE_EDITION=$MODULE_EDITION

      - uses: actions/checkout@v4

      - name: Download base images and auth prepare
        run: |
          wget https://fox.flant.com/api/v4/projects/deckhouse%2Fbase-images/packages/generic/base_images/$BASE_IMAGES_VERSION/base_images.yml -O base_images.yml
          cat base_images.yml

      - uses: deckhouse/modules-actions/setup@v4
        with:
          registry: ${{ vars.DEV_REGISTRY }}
          registry_login: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}
      - uses: deckhouse/modules-actions/build@v4
        with:
          module_source: "${{ vars.DEV_MODULE_SOURCE }}"
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ env.MODULES_MODULE_TAG }}
          source_repo: ${{ secrets.SOURCE_REPO }}
          source_repo_ssh_key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          svace_enabled: ${{ contains(github.event.pull_request.labels.*.name, 'analyze/svace') || inputs.svace_enabled == true }}
          svace_analyze_host: "${{ secrets.SVACE_ANALYZE_HOST }}"
          svace_analyze_ssh_user: "${{ secrets.SVACE_ANALYZE_SSH_USER }}"
          svace_analyze_ssh_key: "${{ secrets.SVACE_ANALYZE_SSH_PRIVATE_KEY }}"

  analyze_build:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'analyze/svace') || inputs.svace_enabled == true }}
    name: Analyze build
    runs-on: [self-hosted, large]
    needs:
      - dev_setup_build
    steps:
      - uses: deckhouse/modules-actions/svace_analyze@v4
        with:
          project_group: ${{ github.event.repository.name }}
          ci_commit_ref_name: ${{ github.event.pull_request.head.ref || github.ref_name }}
          ci_commit_hash: ${{ github.sha }}
          svace_analyze_host: "${{ secrets.SVACE_ANALYZE_HOST }}"
          svace_analyze_ssh_user: "${{ secrets.SVACE_ANALYZE_SSH_USER }}"
          svacer_url: "${{ secrets.SVACER_URL }}"
          svacer_import_user: "${{ secrets.SVACER_IMPORT_USER }}"
          svacer_import_password: "${{ secrets.SVACER_IMPORT_PASSWORD }}"
          svace_analyze_ssh_private_key: "${{ secrets.SVACE_ANALYZE_SSH_PRIVATE_KEY }}"

  # E2E: gate by input from caller (trivy) so label detection uses the same github.event as the top-level workflow.
  run_e2e_smoke_tests:
    if: ${{ inputs.run_e2e_smoke_tests == true }}
    name: Run E2E Smoke Tests
    runs-on: [self-hosted, regular]
    needs:
      - dev_setup_build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Install kubectl
      #   uses: azure/setup-kubectl@v3
      #   with:
      #     version: 'latest'

      # - name: Setup Go
      #   uses: actions/setup-go@v4
      #   with:
      #     go-version: '1.24.9'
      #     cache-dependency-path: e2e/go.sum

      - name: Setup test environment
        run: |
          # Create temp files with mktemp (unique names, auto-cleanup friendly)
          E2E_SSH_KEY_PATH=$(mktemp /tmp/e2e_ssh_key.XXXXXX)
          E2E_SSH_PUB_PATH=$(mktemp /tmp/e2e_ssh_pub.XXXXXX)
          E2E_KUBECONFIG_PATH=$(mktemp /tmp/e2e_kubeconfig.XXXXXX)

          echo "E2E_SSH_KEY_PATH=${E2E_SSH_KEY_PATH}" >> $GITHUB_ENV
          echo "E2E_SSH_PUB_PATH=${E2E_SSH_PUB_PATH}" >> $GITHUB_ENV
          echo "E2E_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> $GITHUB_ENV

          printf '%s\n' "$E2E_SSH_PRIVATE_KEY" > "${E2E_SSH_KEY_PATH}"
          chmod 600 "${E2E_SSH_KEY_PATH}"
          echo "SSH_PRIVATE_KEY=${E2E_SSH_KEY_PATH}" >> $GITHUB_ENV

          if [ -n "$E2E_SSH_PUBLIC_KEY" ]; then
            printf '%s\n' "$E2E_SSH_PUBLIC_KEY" > "${E2E_SSH_PUB_PATH}"
            chmod 644 "${E2E_SSH_PUB_PATH}"
            echo "SSH_PUBLIC_KEY=${E2E_SSH_PUB_PATH}" >> $GITHUB_ENV
            DERIVED_PUB=$(ssh-keygen -y -f "${E2E_SSH_KEY_PATH}" 2>/dev/null)
            STORED_PUB=$(cat "${E2E_SSH_PUB_PATH}")
            if [ -z "$DERIVED_PUB" ] || [ "$DERIVED_PUB" != "$STORED_PUB" ]; then
              echo "::error::E2E_SSH_PUBLIC_KEY does not match E2E_SSH_PRIVATE_KEY (not a key pair). VM auth will fail."
              exit 1
            fi
            echo "SSH key pair verified"
          fi

          if [ -n "$E2E_CLUSTER_KUBECONFIG" ]; then
            echo "$E2E_CLUSTER_KUBECONFIG" | base64 -d > "${E2E_KUBECONFIG_PATH}"
            chmod 600 "${E2E_KUBECONFIG_PATH}"
            echo "KUBE_CONFIG_PATH=${E2E_KUBECONFIG_PATH}" >> $GITHUB_ENV
          fi

          TEST_NAMESPACE="e2e-${{ vars.MODULE_NAME }}-pr${{ github.event.pull_request.number }}-${{ github.run_id }}"
          echo "TEST_NAMESPACE=${TEST_NAMESPACE}" >> $GITHUB_ENV
          echo "Namespace: ${TEST_NAMESPACE}"
        env:
          E2E_SSH_PRIVATE_KEY: ${{ secrets.E2E_SSH_PRIVATE_KEY }}
          E2E_SSH_PUBLIC_KEY: ${{ secrets.E2E_SSH_PUBLIC_KEY }}
          E2E_CLUSTER_KUBECONFIG: ${{ secrets.E2E_CLUSTER_KUBECONFIG }}

      - name: Diagnose SSH to base cluster (ssh -vvv)
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.E2E_SSH_HOST }}
          SSH_USER: ${{ secrets.E2E_SSH_USER }}
        run: |
          echo "SSH_HOST length: ${#SSH_HOST}, SSH_USER length: ${#SSH_USER}"
          if [ -z "$SSH_HOST" ]; then echo "::error::SSH_HOST is empty"; exit 1; fi
          echo "Probing port 22 (nc -zv)..."
          nc -zv "$SSH_HOST" 22 2>&1 || true
          echo "---"

      - name: Run E2E tests (storage-e2e, TestSdsNodeConfigurator)
        id: run_tests
        env:
          # Self-hosted runners often use a shared read-only module dir under /opt/.../go/pkg/mod.
          # storage-e2e writes temp/bootstrap state under the storage-e2e module path — use a writable cache.
          GOMODCACHE: ${{ github.workspace }}/e2e/.gomodcache
          GOCACHE: ${{ github.workspace }}/e2e/.gocache
          TEST_CLUSTER_CREATE_MODE: ${{ secrets.E2E_TEST_CLUSTER_CREATE_MODE }}
          TEST_CLUSTER_NAMESPACE: e2e-${{ vars.MODULE_NAME }}-pr${{ github.event.pull_request.number }}-${{ github.run_id }}
          TEST_CLUSTER_STORAGE_CLASS: ${{ secrets.E2E_TEST_CLUSTER_STORAGE_CLASS }}
          TEST_CLUSTER_CLEANUP: ${{ secrets.E2E_TEST_CLUSTER_CLEANUP }}
          DKP_LICENSE_KEY: ${{ secrets.E2E_DECKHOUSE_LICENSE }}
          REGISTRY_DOCKER_CFG: ${{ secrets.E2E_REGISTRY_DOCKER_CFG }}
          SSH_HOST: ${{ secrets.E2E_SSH_HOST }}
          SSH_USER: ${{ secrets.E2E_SSH_USER }}
          # Jump host for test cluster nodes (10.10.10.x). Without it the test connects to the node directly from runner → connection timed out. Default = base cluster (SSH_HOST).
          SSH_JUMP_HOST: ${{ secrets.E2E_SSH_JUMP_HOST || secrets.E2E_SSH_HOST }}
          SSH_JUMP_USER: ${{ secrets.E2E_SSH_JUMP_USER || secrets.E2E_SSH_USER }}
          # API SSH tunnel must match Cleanup: use ProxyJump only when E2E_SSH_JUMP_HOST secret is set. Do not fall back to SSH_HOST here — ssh -J user@host user@host breaks the forward.
          E2E_TUNNEL_SSH_JUMP_HOST: ${{ secrets.E2E_SSH_JUMP_HOST }}
          E2E_TUNNEL_SSH_JUMP_USER: ${{ secrets.E2E_SSH_JUMP_USER }}
          # Do not set KUBE_CONFIG_PATH here — it is taken from GITHUB_ENV (Setup writes the path to the file from E2E_CLUSTER_KUBECONFIG). Otherwise an empty vars value overwrites the fallback and storage-e2e cannot find kubeconfig when "sudo cat admin.conf" on the master fails.
          LOG_LEVEL: ${{ vars.E2E_LOG_LEVEL }}
        run: |
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

          # Kubeconfig from E2E_CLUSTER_KUBECONFIG often points at https://127.0.0.1:6445 (API via SSH port-forward).
          # The tunnel was only started in the later Cleanup step, so Module/virtualization pre-wait and storage-e2e
          # had no reachable API — first client calls could hang until TCP timeouts. Mirror Cleanup's tunnel here.
          E2E_SSH_TUNNEL_PID=""
          e2e_stop_ssh_tunnel() {
            if [ -n "${E2E_SSH_TUNNEL_PID:-}" ]; then
              kill "${E2E_SSH_TUNNEL_PID}" 2>/dev/null || true
              wait "${E2E_SSH_TUNNEL_PID}" 2>/dev/null || true
            fi
          }
          trap e2e_stop_ssh_tunnel EXIT

          # Use the same file as KUBE_CONFIG_PATH (Setup writes both E2E_KUBECONFIG_PATH and KUBE_CONFIG_PATH).
          # Pick a server: line that points at loopback — the *first* server: in the file may be another cluster.
          E2E_KC_FILE="${E2E_KUBECONFIG_PATH:-${KUBE_CONFIG_PATH:-}}"
          echo "E2E kubeconfig path: E2E_KUBECONFIG_PATH=${E2E_KUBECONFIG_PATH:-} KUBE_CONFIG_PATH=${KUBE_CONFIG_PATH:-} -> E2E_KC_FILE=${E2E_KC_FILE:-}"
          E2E_NEED_TUNNEL=false
          E2E_LOCAL_API_PORT=""
          SERVER_LINE=""
          if [ -n "${E2E_KC_FILE}" ] && [ -f "$E2E_KC_FILE" ]; then
            # Do not require ^ so BOM or odd indentation still matches; avoid missing the loopback cluster.
            SERVER_LINE="$(grep -F 'server:' "$E2E_KC_FILE" | grep -E '127\.0\.0\.1|localhost|\[::1\]' | head -1 || true)"
            if [ -n "$SERVER_LINE" ]; then
              E2E_NEED_TUNNEL=true
              E2E_LOCAL_API_PORT="$(printf '%s' "$SERVER_LINE" | sed -n 's/.*127\.0\.0\.1:\([0-9][0-9]*\).*/\1/p')"
              if [ -z "$E2E_LOCAL_API_PORT" ]; then
                E2E_LOCAL_API_PORT="$(printf '%s' "$SERVER_LINE" | sed -n 's/.*localhost:\([0-9][0-9]*\).*/\1/p')"
              fi
              if [ -z "$E2E_LOCAL_API_PORT" ]; then
                E2E_LOCAL_API_PORT="$(printf '%s' "$SERVER_LINE" | sed -n 's/.*\[::1\]:\([0-9][0-9]*\).*/\1/p')"
              fi
              [ -z "$E2E_LOCAL_API_PORT" ] && E2E_LOCAL_API_PORT=6445
            fi
            if [ "$E2E_NEED_TUNNEL" != true ] && grep -qE '127\.0\.0\.1:644[35]|localhost:644[35]' "$E2E_KC_FILE" 2>/dev/null; then
              echo "::warning::Loopback apiserver URL found in kubeconfig but server: line was not matched; forcing tunnel (local port 6445)."
              E2E_NEED_TUNNEL=true
              E2E_LOCAL_API_PORT=6445
            fi
          fi

          if [ "$E2E_NEED_TUNNEL" = true ] && [ -n "${SSH_HOST:-}" ] && [ -n "${SSH_USER:-}" ] && [ -f "${E2E_SSH_KEY_PATH:-}" ]; then
            echo "Starting SSH tunnel for E2E (localhost:${E2E_LOCAL_API_PORT} -> 127.0.0.1:6445 on ${SSH_HOST}, same as Cleanup)..."
            echo "Kubeconfig server (sanitized): $(printf '%s' "$SERVER_LINE" | sed 's/[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}/x.x.x.x/g')"
            # Exit if port-forward cannot be established (otherwise ssh keeps running without -L and tests see connection refused).
            SSH_OPTS="-N -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
            TUNNEL_JUMP_USER="${E2E_TUNNEL_SSH_JUMP_USER:-$SSH_USER}"
            if [ -n "${E2E_TUNNEL_SSH_JUMP_HOST:-}" ]; then
              ssh $SSH_OPTS -i "$E2E_SSH_KEY_PATH" \
                -J "${TUNNEL_JUMP_USER}@${E2E_TUNNEL_SSH_JUMP_HOST}" \
                -L "${E2E_LOCAL_API_PORT}:127.0.0.1:6445" "${SSH_USER}@${SSH_HOST}" &
            else
              ssh $SSH_OPTS -i "$E2E_SSH_KEY_PATH" \
                -L "${E2E_LOCAL_API_PORT}:127.0.0.1:6445" "${SSH_USER}@${SSH_HOST}" &
            fi
            E2E_SSH_TUNNEL_PID=$!
            sleep 3
            if ! kill -0 "$E2E_SSH_TUNNEL_PID" 2>/dev/null; then
              echo "::error::SSH tunnel process exited immediately (check SSH host, key, and jump). Forward: -L ${E2E_LOCAL_API_PORT}:127.0.0.1:6445"
              exit 1
            fi
            if command -v nc >/dev/null 2>&1; then
              if ! nc -zv 127.0.0.1 "$E2E_LOCAL_API_PORT" 2>&1; then
                echo "::error::Nothing listening on 127.0.0.1:${E2E_LOCAL_API_PORT} after SSH forward; kubeconfig must use the same port."
                exit 1
              fi
            fi
          elif [ "$E2E_NEED_TUNNEL" = true ]; then
            echo "::error::Kubeconfig uses loopback API but SSH is not configured (SSH_HOST/SSH_USER/E2E_SSH_KEY_PATH). Cannot reach apiserver."
            exit 1
          fi

          cd e2e
          go mod tidy
          go mod download
          # PrepareBootstrapConfig (storage-e2e) resolves paths via runtime.Caller from pkg/cluster/cluster.go inside the
          # module copy, so it writes temp/ under GOMODCACHE/.../storage-e2e@.../ — not under the checkout. Go extracts
          # modules read-only; without this, mkdir .../temp fails with permission denied on self-hosted runners.
          if [ -n "${GOMODCACHE:-}" ] && [ -d "${GOMODCACHE}/github.com/deckhouse" ]; then
            echo "Making storage-e2e module in GOMODCACHE writable for bootstrap temp/..."
            shopt -s nullglob
            for d in "${GOMODCACHE}"/github.com/deckhouse/storage-e2e@*; do
              if [ -d "$d" ]; then
                chmod -R u+w "$d" || true
                mkdir -p "$d/temp/cluster" || true
                chmod -R u+w "$d/temp" 2>/dev/null || true
                # SecretsWaitTimeout is 2m in upstream; worker bootstrap secret often appears later.
                cfg="$d/internal/config/config.go"
                if [ -f "$cfg" ] && grep -q 'SecretsWaitTimeout   = 2 \* time\.Minute' "$cfg"; then
                  sed -i 's/SecretsWaitTimeout   = 2 \* time\.Minute/SecretsWaitTimeout   = 15 * time.Minute/' "$cfg"
                  echo "Patched SecretsWaitTimeout to 15m in storage-e2e ($d)"
                fi
                RECONNECT_PATCH="${GITHUB_WORKSPACE}/e2e/patches/storage-e2e-reconnect-after-add-nodes.patch"
                if [ -f "$RECONNECT_PATCH" ] && [ -f "$d/pkg/cluster/cluster.go" ]; then
                  if ! grep -q 'refresh SSH tunnel after node bootstrap' "$d/pkg/cluster/cluster.go" 2>/dev/null; then
                    patch -p0 --batch -d "$d" -i "$RECONNECT_PATCH" || { echo "::error::storage-e2e reconnect patch failed (wrong module version?)"; exit 1; }
                    echo "Applied storage-e2e reconnect-after-add-nodes patch ($d)"
                  fi
                fi
              fi
            done
            shopt -u nullglob
          fi
          go test -v -count=1 -timeout 60m ./tests/ -run '^TestSdsNodeConfigurator$' 2>&1 | tee ../e2e-test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "TEST_EXIT_CODE=${TEST_EXIT_CODE}" >> $GITHUB_ENV
          echo "${TEST_EXIT_CODE}" > ../e2e-test-exit-code.txt
          exit ${TEST_EXIT_CODE}

      - name: Cleanup test resources
        if: always()
        env:
          SSH_HOST: ${{ secrets.E2E_SSH_HOST }}
          SSH_USER: ${{ secrets.E2E_SSH_USER }}
          SSH_JUMP_HOST: ${{ secrets.E2E_SSH_JUMP_HOST }}
          SSH_JUMP_USER: ${{ secrets.E2E_SSH_JUMP_USER }}
        run: |
          SSH_TUNNEL_PID=""
          if [ -z "$E2E_KUBECONFIG_PATH" ] || [ ! -f "$E2E_KUBECONFIG_PATH" ]; then
            echo "No kubeconfig at E2E_KUBECONFIG_PATH=$E2E_KUBECONFIG_PATH, skip k8s cleanup"
          else
            if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -f "$E2E_SSH_KEY_PATH" ]; then
              echo "Starting SSH tunnel for cleanup (localhost:6445 -> base cluster API)..."
              if [ -n "$SSH_JUMP_HOST" ]; then
                JUMP_USER="${SSH_JUMP_USER:-$SSH_USER}"
                ssh -N -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i "$E2E_SSH_KEY_PATH" -J "${JUMP_USER}@${SSH_JUMP_HOST}" -L 6445:127.0.0.1:6445 "${SSH_USER}@${SSH_HOST}" &
              else
                ssh -N -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i "$E2E_SSH_KEY_PATH" -L 6445:127.0.0.1:6445 "${SSH_USER}@${SSH_HOST}" &
              fi
              SSH_TUNNEL_PID=$!
              sleep 2
            fi
            export KUBECONFIG="$E2E_KUBECONFIG_PATH"
            echo "Cleaning up namespace: ${TEST_NAMESPACE}"
            kubectl delete namespace "${TEST_NAMESPACE}" --ignore-not-found=true --timeout=5m 2>/dev/null || true
            kubectl delete vd -n "${TEST_NAMESPACE}" --all --ignore-not-found=true --timeout=2m 2>/dev/null || true
            kubectl delete vm -n "${TEST_NAMESPACE}" --all --ignore-not-found=true --timeout=2m 2>/dev/null || true
            echo "K8s cleanup completed"
          fi
          # Kill SSH tunnel by PID (not pkill) to avoid killing tunnels from parallel jobs
          if [ -n "$SSH_TUNNEL_PID" ]; then
            kill "$SSH_TUNNEL_PID" 2>/dev/null || true
          fi

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-smoke-test-logs-${{ vars.MODULE_NAME }}-${{ github.run_id }}
          path: e2e-test-output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let exitCode = '1';
            try {
              exitCode = fs.readFileSync('e2e-test-exit-code.txt', 'utf8').trim() || '1';
            } catch (_) {
              exitCode = '1';
            }
            const status = exitCode === '0' ? '✅' : '❌';
            const statusText = exitCode === '0' ? 'passed' : 'failed';

            const comment = `## E2E Smoke Tests Results ${status}

            **Module:** ${{ vars.MODULE_NAME }}
            **Framework:** storage-e2e
            **Namespace:** \`${process.env.TEST_NAMESPACE}\`
            **Status:** Tests ${statusText}


            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            - **Workflow:** ${{ github.workflow }}
            - **Run ID:** ${{ github.run_id }}
            - **Commit:** ${{ github.sha }}
            - **PR:** #${{ github.event.pull_request.number }}
            - **Triggered by:** \`e2e-smoke-test\` label
            - **Exit Code:** ${exitCode}

            Tests were executed via storage-e2e (TestSdsNodeConfigurator).

            **Artifacts:** Test logs are available in workflow artifacts.

            `;

            if (context.eventName === "pull_request" || context.eventName === "pull_request_target") {
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Remove e2e-smoke-test label from PR
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'e2e-smoke-test'
              });
              console.log('Removed label e2e-smoke-test from PR');
            } catch (err) {
              if (err.status !== 404) throw err;
              console.log('Label e2e-smoke-test not on PR (already removed or never added)');
            }

      - name: Cleanup temp files (SSH keys, kubeconfig)
        if: always()
        run: |
          rm -f "$E2E_SSH_KEY_PATH" "$E2E_SSH_PUB_PATH" "$E2E_KUBECONFIG_PATH" 2>/dev/null || true
          echo "Temp files cleaned"
