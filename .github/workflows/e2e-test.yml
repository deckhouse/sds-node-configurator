# E2E tests via storage-e2e (separate workflow).
#
# Label `e2e-smoke-test` on a PR:
#   - first run: create-cluster (persisted per PR) + run-tests
#   - push with label already set: reuse/resume cluster + run-tests only
#   - failed create: re-run resumes from cluster-state (TEST_CLUSTER_RESUME)
#
# Remove label `e2e-smoke-test` manually:
#   - runs teardown-cluster only, then marks session torn down

name: E2E tests

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize, ready_for_review]
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (required for manual run)"
        type: string
        required: true
      pipeline_mode:
        description: "create-and-test or teardown-only"
        type: choice
        options:
          - create-and-test
          - teardown-only
        default: create-and-test
      label_filter:
        description: "Ginkgo label filter"
        type: string
        required: false
        default: ""
      cluster_provider:
        type: choice
        options:
          - alwaysCreateNew
          - alwaysUseExisting
          - commander
        default: alwaysCreateNew
      storage_e2e_ref:
        type: string
        default: ndemchuk-reusable-ci

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: write

concurrency:
  group: e2e-smoke-test-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref_name }}
  cancel-in-progress: false

jobs:
  e2e_gate:
    name: Resolve E2E trigger
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pipeline_mode: ${{ steps.resolve.outputs.pipeline_mode }}
      run_e2e: ${{ steps.resolve.outputs.run_e2e }}
      skip_create_cluster: ${{ steps.resolve.outputs.skip_create_cluster }}
    steps:
      - name: Resolve PR number and pipeline mode
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            // Teardown on unlabeled only when one of these labels is removed.
            const e2eLabels = ['e2e-smoke-test', 'e2e-test'];
            const isE2eLabel = (name) => e2eLabels.includes(name);
            let prNumber = '';
            let pipelineMode = '';
            let runE2e = 'false';
            let skipCreate = 'false';

            if (context.eventName === 'workflow_dispatch') {
              prNumber = String(context.payload.inputs.pr_number || '');
              pipelineMode = context.payload.inputs.pipeline_mode || 'create-and-test';
              runE2e = prNumber ? 'true' : 'false';
              core.setOutput('pr_number', prNumber);
              core.setOutput('pipeline_mode', pipelineMode);
              core.setOutput('run_e2e', runE2e);
              core.setOutput('skip_create_cluster', skipCreate);
              return;
            }

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              prNumber = String(pr.number);
              const hasLabel = pr.labels.some((l) => isE2eLabel(l.name));
              const eventLabel =
                context.payload.label?.name ||
                context.payload.pull_request?.label?.name ||
                '';

              core.info(`pull_request action=${context.payload.action} eventLabel=${eventLabel} hasE2eLabel=${hasLabel}`);

              if (context.payload.action === 'unlabeled' && isE2eLabel(eventLabel)) {
                pipelineMode = 'teardown-only';
                runE2e = 'true';
              } else if (hasLabel || (context.payload.action === 'labeled' && isE2eLabel(eventLabel))) {
                pipelineMode = 'create-and-test';
                runE2e = 'true';
                const isProvisionTrigger =
                  (context.payload.action === 'labeled' && isE2eLabel(eventLabel)) ||
                  context.payload.action === 'opened' ||
                  context.payload.action === 'reopened';
                if (!isProvisionTrigger) {
                  skipCreate = 'true';
                }
              }
              core.setOutput('pr_number', prNumber);
              core.setOutput('pipeline_mode', pipelineMode);
              core.setOutput('run_e2e', runE2e);
              core.setOutput('skip_create_cluster', skipCreate);
              return;
            }

            if (context.eventName === 'push') {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });
              const pr = prs[0];
              if (!pr) {
                core.setOutput('run_e2e', 'false');
                return;
              }
              const hasLabel = pr.labels.some((l) => isE2eLabel(l.name));
              if (hasLabel) {
                core.setOutput('pr_number', String(pr.number));
                core.setOutput('pipeline_mode', 'create-and-test');
                core.setOutput('run_e2e', 'true');
                core.setOutput('skip_create_cluster', 'true');
                return;
              }
            }

            core.setOutput('run_e2e', 'false');

      - name: Debug gate outputs
        if: always()
        run: |
          echo "event=${{ github.event_name }} action=${{ github.event.action }}"
          echo "label=${{ github.event.label.name }}"
          echo "pr_number=${{ steps.resolve.outputs.pr_number }}"
          echo "pipeline_mode=${{ steps.resolve.outputs.pipeline_mode }}"
          echo "run_e2e=${{ steps.resolve.outputs.run_e2e }}"
          echo "skip_create_cluster=${{ steps.resolve.outputs.skip_create_cluster }}"

  e2e:
    name: storage-e2e (${{ needs.e2e_gate.outputs.pipeline_mode }})
    needs: [e2e_gate]
    if: needs.e2e_gate.outputs.run_e2e == 'true'
    uses: deckhouse/storage-e2e/.github/workflows/e2e-reusable.yml@ndemchuk-reusable-ci
    secrets: inherit
    with:
      pipeline_mode: ${{ needs.e2e_gate.outputs.pipeline_mode }}
      pr_number: ${{ needs.e2e_gate.outputs.pr_number }}
      module_slug: ${{ vars.MODULE_NAME }}
      module_path: e2e
      cluster_provider: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cluster_provider || 'alwaysCreateNew' }}
      cluster_config: e2e/tests/cluster_config.yml
      test_package: ./tests/
      test_timeout: 60m
      label_filter: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.label_filter || '' }}
      storage_e2e_ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.storage_e2e_ref || 'ndemchuk-reusable-ci' }}
      runner_labels: '["self-hosted","regular"]'
      skip_create_cluster: ${{ needs.e2e_gate.outputs.skip_create_cluster == 'true' }}

  e2e_pr_feedback:
    name: E2E PR feedback
    needs: [e2e_gate, e2e]
    if: always() && needs.e2e_gate.outputs.run_e2e == 'true' && needs.e2e_gate.outputs.pipeline_mode == 'create-and-test'
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR with E2E result
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.e2e.result }}';
            const status = result === 'success' ? '✅' : '❌';
            const prNumber = '${{ needs.e2e_gate.outputs.pr_number }}';
            const comment = `## E2E tests ${status}

            **Module:** ${{ vars.MODULE_NAME }}
            **Framework:** storage-e2e (persistent cluster per PR)
            **Status:** ${result === 'success' ? 'passed' : 'failed'}

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            - **PR:** #${prNumber}
            - **Label:** \`e2e-smoke-test\` (not removed automatically)
            - Remove the label manually to run **teardown-cluster** only.

            JUnit is in **Checks** (run-tests job).
            `;
            await github.rest.issues.createComment({
              issue_number: Number(prNumber),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
