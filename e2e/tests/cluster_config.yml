# Test nested cluster configuration
clusterDefinition:
  masters: # Master nodes configuration
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic" # See internal/config/images.go
      cpu: 4
      coreFraction: 20
      ram: 8
      diskSize: 60
  workers: # Worker nodes configuration // TODO implement logic allowing to deploy different number of workes and masters with the same config.
    - hostname: "worker-1"
      hostType: "vm"
      osType: "RedOS 8.0 6.6.26-1.red80.x86_64" # See internal/config/images.go
      cpu: 2
      coreFraction: 20
      ram: 8
      diskSize: 20
    # - hostname: "worker-2"
    #   hostType: "vm"
    #   osType: "RedOS 7.3.6 5.15.78-2.el7.3.x86_64" # See internal/config/images.go
    #   cpu: 2
    #   coreFraction: 50
    #   ram: 2
    #   diskSize: 50
    # - hostname: "worker-3"
    #   hostType: "vm"
    #   osType: "AltLinux Server 10.4" # See internal/config/images.go
    #   cpu: 2
    #   coreFraction: 50
    #   ram: 2
    #   diskSize: 50
    - hostname: "worker-4"
      hostType: "vm"
      osType: "AltLinux Server 11" # See internal/config/images.go
      cpu: 2
      coreFraction: 20
      ram: 8
      diskSize: 20
    # Temporarily disabled to reduce CI cluster footprint.
    # - hostname: "worker-5"
    #   hostType: "vm"
    #   osType: "Ubuntu 24.04 6.8.0-53-generic" # See internal/config/images.go
    #   cpu: 2
    #   coreFraction: 20
    #   ram: 8
    #   diskSize: 20
  # DKP parameters
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    # Module configuration
    modules:
      - name: "snapshot-controller" # TODO add MPO
        version: 1
        enabled: true
        modulePullOverride: "main" # imageTag for ModulePullOverride. Main is default value, used if not specified. Created always when rehistryRepo starts with dev-
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        dependencies: []
