clusterDefinition:
  masters: # Master nodes configuration
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic" # See internal/config/images.go
      cpu: 4
      coreFraction: 20
      ram: 8
      diskSize: 60
  workers: # Worker nodes configuration
    - hostname: "worker-1"
      hostType: "vm"
      osType: "RedOS 8.0 6.6.26-1.red80.x86_64" # See internal/config/images.go
      cpu: 2
      coreFraction: 20
      ram: 8
      diskSize: 20
    - hostname: "worker-5"
      hostType: "vm"
      osType: "Ubuntu 24.04 6.8.0-53-generic" # See internal/config/images.go
      cpu: 2
      coreFraction: 20
      ram: 8
      diskSize: 20
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        modulePullOverride: "${E2E_MODULE_IMAGE_TAG}"
        dependencies: []
