---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: lvmvolumegroups.storage.deckhouse.io
  labels:
    heritage: deckhouse
    module: sds-node-configurator
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: storage.deckhouse.io
  scope: Cluster
  names:
    kind: LVMVolumeGroup
    plural: lvmvolumegroups
    singular: lvmvolumegroup
    shortNames:
      - lvg
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            An interface for managing Volume Groups and Thin pools on the nodes.
            
            > These resources might be created both by a user and the `sds-node-configurator` controller. `sds-node-configurator` controller will automatically create an LVMVolumeGroup resource if it detects an existing Volume Group on a node tagged with 'storage.deckhouse.io/enabled=true'. Controller will fill in both the 'spec' and 'status' fields.
            > `spec.thinPools` field must be filled in by yourself.
          required:
            - spec
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: |
                    (self.type == "Local" && has(self.local)) || self.type != "Local"
                  message: "The 'local' field is required when the 'type' field is 'Local'."
                - rule: |
                    has(self.blockDeviceSelector) || (has(self.fileDevices) && size(self.fileDevices) > 0)
                  message: "At least one of 'blockDeviceSelector' or 'fileDevices' must be specified."
                - rule: '!has(oldSelf.fileDevices) || oldSelf.fileDevices.all(o, has(self.fileDevices) && self.fileDevices.exists(n, n.directory == o.directory && n.size == o.size))'
                  message: 'Existing fileDevices entries are immutable. Add a new entry instead of editing directory or size.'
              required:
                - type
                - actualVGNameOnTheNode
              properties:
                type:
                  type: string
                  description: |
                    Type of a Volume Group.
                    
                    Possible values:
                    
                    - `Local`: Local volume group; the devices used are not distributed (not Shared LUN).
                  enum:
                    - Local
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: "The type field is immutable."
                local:
                  type: object
                  description: |
                    Desired configuration for a local Volume Group.
                  required:
                    - nodeName
                  properties:
                    nodeName:
                      type: string
                      description: |
                        Desired node for the LVM Volume Group.
                        
                        > This field is immutable.
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: "The nodeName field is immutable."
                blockDeviceSelector:
                  type: object
                  description: |
                    Desired block device selector.
                    
                    > Note: Selected block devices must belong to the same node for a volume group of type ‘Local’.
                  properties:
                    matchLabels:
                      type: object
                      description: |
                        Desired block device selector labels.
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      description: |
                        Desired block device selector expressions.
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                            description: |
                              Label key to check.
                          operator:
                            type: string
                            description: |
                              Operator used to compare values.
                            enum:
                              - In
                              - NotIn
                              - Exists
                              - DoesNotExist
                          values:
                            type: array
                            description: |
                              Array of values to compare. Required if the operator is `In` or `NotIn`.
                            items:
                              type: string
                actualVGNameOnTheNode:
                  type: string
                  description: |
                    Desired name of a Volume Group. Must be unique for the node it is on.
                    
                    > This field is immutable.
                  x-kubernetes-validations:
                    - rule: self == oldSelf
                      message: "The actualVGNameOnTheNode field is immutable."
                fileDevices:
                  type: array
                  maxItems: 32
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - directory
                    - size
                  description: |
                    File-backed block devices to create as LVM PVs for this Volume Group.

                    The agent will create a preallocated file in the specified directory,
                    attach it as a loop device, and use it as a Physical Volume.
                    File devices and block devices can be used together in the same VG.

                    Existing entries are immutable: `directory` and `size` cannot be changed
                    after creation, because the backing file's path is derived from them and
                    the loop device captures its size at attach time. To increase capacity,
                    add a new `fileDevices` entry instead of editing an existing one.
                  items:
                    type: object
                    required:
                      - directory
                      - size
                    properties:
                      directory:
                        type: string
                        maxLength: 4096
                        description: |
                          Absolute directory on the node's filesystem where the backing file
                          will be created.

                          Must be the module's configured base directory
                          (fileDevicesDirectory, default /opt/deckhouse/sds/file-devices) or a
                          subdirectory of it; the agent rejects paths outside that subtree so a
                          stray entry cannot fill an arbitrary host path.

                          The agent creates the directory automatically (mkdir -p) if it does
                          not exist. The path must be absolute and must not contain '..'
                          segments. Provisioning fails if the path is on a read-only
                          filesystem, a non-directory component is in the way, or there is not
                          enough free space for the requested size.
                      size:
                        type: string
                        maxLength: 32
                        pattern: '^[0-9]+(\.[0-9]+)?(E|P|T|G|M|k|Ei|Pi|Ti|Gi|Mi|Ki)?$'
                        description: |
                          Size of the preallocated backing file. Must be at least 1Gi.

                          Prefer binary units (`Gi`, `Mi`). Decimal units are accepted
                          by the format but are smaller than they look: `1G` is 10^9 bytes,
                          which is below the 1Gi (2^30 bytes) minimum and will be rejected
                          by the agent. Because an existing entry's `size` is immutable and
                          cannot be removed, a too-small value can only be corrected by
                          deleting and recreating the LVMVolumeGroup, so set it correctly.
                thinPools:
                  type: array
                  description: |
                    Desired thin pool configuration.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: |
                          Desired thin pool name.
                          
                          > This field is immutable.
                      size:
                        x-kubernetes-int-or-string: true
                        pattern: '^[0-9]+(\.[0-9]+)?(E|P|T|G|M|k|Ei|Pi|Ti|Gi|Mi|Ki)?$|^[1-9][0-9]?%$|100%'
                        description: |
                          Desired thin pool size. Might be specified as number or percent size of total Volume Group space.
                          
                          > Note, that if you specify the percent size, the thin pool will be automatically extended when Volume Group is extended.
                      allocationLimit:
                        type: string
                        pattern: '^[1-9][0-9]{2,3}%$'
                        default: "150%"
                        description: |
                          Thin pool oversize limit.
                    required:
                      - name
                      - size
            status:
              type: object
              properties:
                thinPoolReady:
                  type: string
                  description: |
                    Shows the number of healthy and total thin pools.
                configurationApplied:
                  type: string
                  description: |
                    Indicates if the last configuration has been successfully applied.
                phase:
                  type: string
                  description: |
                    General LVMVolumeGroup condition.
                  enum:
                    - Pending
                    - Ready
                    - NotReady
                    - Terminating
                    - ""
                conditions:
                  description: |
                    LVMVolumeGroup conditions.
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: |
                          Condition type.
                        enum:
                          - VGConfigurationApplied
                          - VGReady
                          - NodeReady
                          - AgentReady
                          - Ready
                      status:
                        type: string
                        description: |
                          Condition status.
                      reason:
                        type: string
                        description: |
                          Reason for the current status.
                      message:
                        type: string
                        description: |
                          Information about the current status.
                      lastTransitionTime:
                        type: string
                        description: |
                          Time the condition was updated.
                      observedGeneration:
                        type: integer
                        description: |
                          Resource version when the condition was applied.
                vgUUID:
                  type: string
                  description: |
                    Volume Group UUID.
                vgSize:
                  type: string
                  description: |
                    Volume Group capacity.
                vgFree:
                  type: string
                  description: |
                    Volume Group free space.
                extentSize:
                  type: string
                  description: |
                    Physical extent size of the Volume Group.
                allocatedSize:
                  type: string
                  description: |
                    Amount of space currently occupied on the Volume Group.
                thinPools:
                  type: array
                  description: |
                    Current state of the Volume Group's thin pools.
                    
                    > Might be empty if there are no thin pools in the Volume Group.
                  items:
                    type: object
                    required:
                      - name
                      - actualSize
                      - usedSize
                    properties:
                      name:
                        type: string
                        description: |
                          Thin pool name.
                      actualSize:
                        type: string
                        description: |
                          Thin pool capacity.
                      usedSize:
                        type: string
                        description: |
                          Thin pool used size.
                      allocatedSize:
                        type: string
                        description: |
                          Total requested size of logical volumes in the thin pool.
                      allocationLimit:
                        type: string
                        description: |
                          Thin pool oversize limit.
                        default: "150%"
                        pattern: '^[1-9][0-9]{2,3}%$'
                      availableSpace:
                        type: string
                        description: |
                          Thin pool free space available.
                      ready:
                        type: boolean
                        description: |
                          Thin pool health status.
                      message:
                        type: string
                        description: |
                          Information about the status.
                nodes:
                  type: array
                  description: |
                    Information about the nodes the Volume Group is on.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: |
                          Node name.
                      devices:
                        type: array
                        description: |
                          Information about the devices used in the Volume Group on the current node.
                        items:
                          type: object
                          properties:
                            path:
                              type: string
                              description: |
                                Device path on the node (e.g., `/dev/sda`).
                            pvSize:
                              type: string
                              description: |
                                Physical Volume size.
                            devSize:
                              type: string
                              description: |
                                Block device size.
                            pvUUID:
                              type: string
                              description: |
                                LVM Physical Volume UUID.
                            blockDevice:
                              type: string
                              description: |
                                Name of the corresponding block device resource.
                      fileDevices:
                        type: array
                        description: |
                          Information about the file-backed devices used in the Volume Group on the current node.
                        items:
                          type: object
                          properties:
                            filePath:
                              type: string
                              description: |
                                Path to the backing file on the node.
                            loopDevice:
                              type: string
                              description: |
                                Loop device path (e.g., `/dev/loop0`).
                            size:
                              type: string
                              description: |
                                Size of the Physical Volume created on the backing file.
                                This is slightly smaller than the requested `spec.fileDevices[].size`
                                because LVM reserves space for PV metadata (the same way
                                `status.nodes[].devices[].pvSize` differs from the raw device size).
                            pvUUID:
                              type: string
                              description: |
                                LVM Physical Volume UUID.
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .status.thinPoolReady
          name: ThinPools
          type: string
          description: Current and total Thin pools count.
        - jsonPath: .status.configurationApplied
          name: Configuration Applied
          type: string
          description: If last configuration has been successfully applied.
        - jsonPath: .status.phase
          name: phase
          type: string
          description: Resource phase.
        - jsonPath: .status.nodes..name
          name: node
          type: string
          description: Node the Volume Group is on.
        - jsonPath: .status.vgSize
          name: size
          type: string
          description: Total Volume Group size.
        - jsonPath: .status.allocatedSize
          name: allocated size
          type: string
          description: Actual Volume Group size.
        - jsonPath: .spec.actualVGNameOnTheNode
          name: VG
          type: string
          description: Actual Volume Group name.
        - jsonPath: .spec.type
          name: type
          type: string
          description: Volume Group type.
          priority: 1
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
          description: Age of this resource.
